---
name: Release
on:
  workflow_dispatch:
    inputs:
      version:
        type: string
        description: "Full version including build number (e.g. 1.2.3.456)"
        required: true
      dryRun:
        type: boolean
        description: Flag to enable the dry-run execution
        default: false
        required: false

env:
  PYTHONUNBUFFERED: 1

jobs:
  release:
    permissions:
      id-token: write
      contents: write
    uses: SonarSource/gh-action_release/.github/workflows/main.yaml@v7
    with:
      publishToBinaries: true
      mavenCentralSync: true
      slackChannel: squad-corelang-releases
      version: ${{ inputs.version }}
      dryRun: ${{ inputs.dryRun == true }}

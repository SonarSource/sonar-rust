name: Bump version
on:
  workflow_call:
    inputs:
      version:
        description: The new version (without -SNAPSHOT suffix)
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: The new version (without -SNAPSHOT suffix)
        required: true
        type: string

jobs:
  bump-version:
    runs-on: github-ubuntu-latest-s
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          version: 2026.2.7
          mise_toml: |
            [tools]
            rust = "1.91.1"
      - name: Validate version input
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [ -z "$VERSION" ]; then
            echo "::error::Input 'version' is empty. The release workflow did not produce a next iteration version."
            exit 1
          fi
      - name: Update version files
        env:
          VERSION: ${{ inputs.version }}
        run: |
          snapshot_version="${VERSION}-SNAPSHOT"
          sed -i "s/^version=.*-SNAPSHOT$/version=${snapshot_version}/" gradle.properties
          sed -i "s/^version=.*-SNAPSHOT$/version=${snapshot_version}/" sonar-rust-plugin/gradle.properties

          cargo_version="${VERSION}"
          if [[ "${cargo_version}" =~ ^[0-9]+\.[0-9]+$ ]]; then
            cargo_version="${cargo_version}.0"
            echo "::notice::Normalizing Cargo version '${VERSION}' to '${cargo_version}'"
          fi

          sed -i "s/^version = \".*\"$/version = \"${cargo_version}\"/" "analyzer/Cargo.toml"
      - name: Update Cargo.lock
        run: cargo generate-lockfile --manifest-path analyzer/Cargo.toml
      - name: Restore tracked mise.toml
        run: git restore --source=HEAD --staged --worktree mise.toml
      - uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          author: ${{ github.actor }} <${{ github.actor }}@users.noreply.github.com>
          commit-message: Prepare next development iteration
          title: Bump version to ${{ inputs.version }}
          branch: bot/bump-project-version
          branch-suffix: timestamp
          base: master
          reviewers: ${{ github.actor }}

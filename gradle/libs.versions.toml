[versions]
junit = "6.1.2"
license-report = "3.1.4"

[libraries]
junit-bom = { module = "org.junit:junit-bom", version.ref = "junit" }
junit-jupiter = { module = "org.junit.jupiter:junit-jupiter" }
junit-platform-launcher = { module = "org.junit.platform:junit-platform-launcher" }
junit-platform-suite-api = { module = "org.junit.platform:junit-platform-suite-api" }
junit-platform-suite-engine = { module = "org.junit.platform:junit-platform-suite-engine" }
license-report-plugin = { module = "com.github.jk1:gradle-license-report", version.ref = "license-report" }

[plugins]
license-report = { id = "com.github.jk1.dependency-license-report", version.ref = "license-report" }
